<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>申请退改 · 贝壳找房旅居</title>
<link rel="stylesheet" href="lvju-app.css?v=5">
</head>
<body>
<div class="app">
  <div class="scr">

    <div class="appbar">
      <a class="bk" href="lvju-app-order-detail.html" onclick="if(history.length>1){history.back();return false}">‹</a>
      <div class="ttl">申请退改</div>
    </div>

    <div class="minihouse">
      <div class="th s-xijiang"></div>
      <div class="mi">
        <div class="nm">云上观景惠居</div>
        <div class="meta">6/14 — 6/16 · 2 晚 · 订单号 …8821</div>
        <div class="st">实付 ¥1,176 · 资金存管中</div>
      </div>
    </div>

    <div class="seg">退改原因</div>
    <div>
      <div class="payopt sel"><div class="nm">行程有变 / 临时退订</div><div class="rd"></div></div>
      <div class="payopt"><div class="nm">买错日期 / 房型</div><div class="rd"></div></div>
      <div class="payopt"><div class="nm">重复下单</div><div class="rd"></div></div>
      <div class="payopt"><div class="nm">对房源 / 服务不满意</div><div class="rd"></div></div>
      <div class="payopt"><div class="nm">其他原因</div><div class="rd"></div></div>
    </div>

    <div class="seg">退款信息</div>
    <div class="panel">
      <div class="kv"><span class="k">订单金额</span><span class="v">¥1,176</span></div>
      <div class="kv"><span class="k">退改手续费</span><span class="v">¥0 · 入住前 48h 免费退</span></div>
      <div class="kv big"><span class="k">可退金额</span><span class="v">¥1,176</span></div>
      <div class="kv"><span class="k">退款方式</span><span class="v">原路退回 · 贝壳存管账户</span></div>
      <div class="kv"><span class="k">预计到账</span><span class="v">1–3 个工作日</span></div>
    </div>

    <div class="seg">退改说明（选填）</div>
    <div class="tarea"><span class="gray">补充说明你的退改情况，便于客服快速处理……</span></div>

    <div style="font-size:11px;color:var(--muted);padding:14px 18px 18px;line-height:1.6;">
      🛡 资金在贝壳存管账户冻结，未结算给房东，符合退改政策可原路退回。退改政策详见《旅居预订与退改协议》。
    </div>
  </div>

  <div class="cta">
    <div class="p"><b>¥1,176</b><span>可退金额</span></div>
    <a class="btn" href="lvju-app-orders.html">提交退改申请</a>
  </div>
</div>
</body>
</html>
