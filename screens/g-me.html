<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>我的 · 江苏保租房监管</title>
  <style>
    :root {
      --bg:#f3f4f6; --surface:#fff; --fg:#111;
      --muted:#6b7280; --border:#e5e7eb;
      --accent:#1e40af; --accent-soft:color-mix(in oklab, var(--accent) 12%, transparent);
      --success:#16a34a; --warn:#ea580c; --danger:#dc2626;
      --radius-md:12px;
      --font:system-ui,-apple-system,'PingFang SC',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0; background:var(--bg); color:var(--fg); font-family:var(--font); font-size:14px; line-height:1.5;}
    a{color:inherit; text-decoration:none;}
    button{font:inherit; cursor:pointer; border:0; background:none; padding:0;}

    .app-shell{max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg); padding-bottom:96px;}

    .user-card{
      background:linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      color:white; padding:18px 16px 24px; margin:12px; border-radius:14px;
      box-shadow:0 4px 16px -6px rgba(30,64,175,0.45);
      position:relative; overflow:hidden;
    }
    .user-card::after{content:'⚖'; position:absolute; right:-6px; bottom:-12px; font-size:90px; opacity:0.12;}
    .uc-row{display:flex; align-items:center; gap:12px;}
    .uc-avatar{width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,0.24); display:grid; place-items:center; font-size:22px; font-weight:700; flex-shrink:0;}
    .uc-info{flex:1;}
    .uc-name{font-size:18px; font-weight:600;}
    .uc-role{font-size:12px; opacity:0.85; margin-top:2px;}
    .uc-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;}
    .uc-st{text-align:center;}
    .uc-st .n{font-size:18px; font-weight:700;}
    .uc-st .l{font-size:11px; opacity:0.85;}

    /* role switcher */
    .role-card{
      margin:0 12px 12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
      padding:14px 16px;
    }
    .role-card h3{margin:0 0 10px; font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0.5px;}
    .role-seg{display:flex; gap:0; background:var(--bg); border-radius:8px; padding:3px; border:1px solid var(--border);}
    .role-seg button{flex:1; padding:8px; font-size:13px; color:var(--muted); border-radius:6px;}
    .role-seg button.on{background:var(--accent); color:white; font-weight:600; box-shadow:0 2px 4px -2px var(--accent);}

    /* list groups */
    .grp{margin:0 12px 12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden;}
    .grp-title{font-size:11px; color:var(--muted); padding:12px 16px 6px; letter-spacing:0.5px; font-weight:500;}
    .grp .it{display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--border); font-size:14px; cursor:pointer;}
    .grp .it:last-child{border-bottom:0;}
    .grp .it svg{width:18px; height:18px; color:var(--accent); flex-shrink:0;}
    .grp .it .lab{flex:1;}
    .grp .it .v{font-size:12px; color:var(--muted);}
    .grp .it .arr{color:var(--muted);}
    .grp .it .badge{font-size:10px; padding:1px 6px; border-radius:8px; background:var(--danger); color:white; font-weight:600;}
  </style>
</head>
<body>
<div class="app-shell">
  <div id="m-header" data-series="g" data-active="me" data-title="我的" data-icon="👤" data-ttl="个人中心" data-sub="处置记录 · 视角切换 · 签批权限"></div>

  <div class="user-card">
    <div class="uc-row">
      <div class="uc-avatar">张</div>
      <div class="uc-info">
        <div class="uc-name">张科长</div>
        <div class="uc-role">南京市住建局 · 监管处 · 副处长</div>
      </div>
    </div>
    <div class="uc-stats">
      <div class="uc-st"><div class="n">42</div><div class="l">本月签批</div></div>
      <div class="uc-st"><div class="n">126</div><div class="l">本年处置</div></div>
      <div class="uc-st"><div class="n">98%</div><div class="l">按时完结率</div></div>
    </div>
  </div>

  <div class="role-card">
    <h3>切换视角</h3>
    <div class="role-seg">
      <button class="on">省厅</button>
      <button>南京市局</button>
      <button>分局督查</button>
    </div>
    <div style="font-size:11px; color:var(--muted); margin-top:8px;">当前可视：全省 13 设区市 · 12,684 套 · 46 个项目</div>
  </div>

  <div class="grp">
    <div class="grp-title">我的工作</div>
    <a class="it" href="g-approval.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="lab">待我签批</span>
      <span class="badge">5</span>
      <span class="arr">›</span>
    </a>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
      <span class="lab">签批历史</span>
      <span class="v">42 件 · 本月</span>
      <span class="arr">›</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="lab">我的批示</span>
      <span class="v">8 条</span>
      <span class="arr">›</span>
    </div>
  </div>

  <div class="grp">
    <div class="grp-title">汇报与简报</div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
      <span class="lab">今日简报</span>
      <span class="v">PDF · 微信卡 · 语音</span>
      <span class="arr">›</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="lab">本周运行简报</span>
      <span class="v">已自动生成</span>
      <span class="arr">›</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="lab">年度白皮书</span>
      <span class="v">已编 87%</span>
      <span class="arr">›</span>
    </div>
  </div>

  <div class="grp">
    <div class="grp-title">设置</div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>
      <span class="lab">消息通知</span>
      <span class="v">高优 · 微信</span>
      <span class="arr">›</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33"/></svg>
      <span class="lab">个人偏好</span>
      <span class="v">字号 · 默认视角</span>
      <span class="arr">›</span>
    </div>
    <div class="it">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <span class="lab">关于本平台</span>
      <span class="v">v2.6.0</span>
      <span class="arr">›</span>
    </div>
    <div class="it" style="color:var(--danger);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="lab">退出登录</span>
      <span class="arr">›</span>
    </div>
  </div>

  <div id="m-tabbar" data-series="g" data-active="me"></div>
</div>
<script src="_region.js"></script>
<script src="_navmobile.js"></script>
</body>
</html>
