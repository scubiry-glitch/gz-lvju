<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>个人中心 · 保租房</title>
  <style>
    :root {
      --bg: #fafafa; --surface: #ffffff; --fg: #111111;
      --muted: #6b6b6b; --border: #e5e5e5; --accent: #2f6feb;
      --accent-soft: color-mix(in oklab, var(--accent) 12%, transparent);
      --accent-on: #ffffff; --success: #17a34a; --warn: #eab308;
      --danger: #dc2626;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --font-display: system-ui, -apple-system, 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
      --font-body: system-ui, -apple-system, 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
      --font-mono: ui-monospace, 'JetBrains Mono', monospace;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: var(--font-body); font-size: 15px; line-height: 1.5;
      background: var(--bg); color: var(--fg);
      -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: 0; background: none; padding: 0; }
    p { margin: 0; }

    .app-shell { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg); padding-bottom: 64px; }
    .status-bar { display: flex; justify-content: space-between; padding: 8px 20px 6px; font-size: 12px; font-weight: 600; background: var(--surface); }

    /* header */
    .page-header {
      background: var(--surface); padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin: 0; }

    /* user card */
    .user-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); padding: 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent-soft); display: grid; place-items: center;
      flex-shrink: 0; color: var(--accent);
    }
    .avatar svg { width: 28px; height: 28px; }
    .user-info .name { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
    .user-info .meta { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .verify-badge {
      display: inline-flex; align-items: center; gap: 2px;
      padding: 1px 6px; border-radius: 3px;
      background: color-mix(in oklab, var(--success) 12%, transparent);
      color: var(--success); font-size: 10px;
    }

    /* service grid */
    .service-section { padding: 12px 16px; }
    .service-section h2 { font-size: 15px; font-weight: 600; margin: 0 0 10px; }
    .service-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    }
    .service-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px 8px;
      text-align: center; display: block;
      position: relative;
    }
    .service-item:active { background: var(--bg); }
    .service-icon {
      width: 40px; height: 40px; margin: 0 auto 8px;
      border-radius: var(--radius-sm); display: grid; place-items: center;
    }
    .service-icon.blue { background: var(--accent-soft); color: var(--accent); }
    .service-icon.green { background: color-mix(in oklab, var(--success) 12%, transparent); color: var(--success); }
    .service-icon.amber { background: color-mix(in oklab, var(--warn) 12%, transparent); color: color-mix(in oklab, var(--warn) 70%, black); }
    .service-icon svg { width: 20px; height: 20px; }
    .service-item .label { font-size: 12px; }
    .service-badge {
      position: absolute; top: 6px; right: 6px;
      min-width: 16px; height: 16px; padding: 0 4px;
      background: var(--danger); color: white; font-size: 9px;
      border-radius: 999px; display: grid; place-items: center;
    }

    /* order section */
    .order-links {
      display: flex; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      overflow: hidden;
    }
    .order-links a {
      flex: 1; text-align: center; padding: 14px 0;
      font-size: 13px; position: relative;
    }
    .order-links a:not(:last-child)::after {
      content: ''; position: absolute; right: 0; top: 25%;
      height: 50%; width: 1px; background: var(--border);
    }
    .order-links a:active { background: var(--bg); }

    /* menu list */
    .menu-list { margin: 0 16px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
    .menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .menu-item:last-child { border-bottom: 0; }
    .menu-item:active { background: var(--bg); }
    .menu-item .menu-icon { width: 20px; height: 20px; color: var(--muted); flex-shrink: 0; }
    .menu-item .menu-arrow { margin-left: auto; color: var(--border); width: 16px; height: 16px; }
    .menu-item .menu-right { margin-left: auto; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

    /* bottom tabs */
    .bottom-tabs {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; padding: 6px 0 calc(6px + var(--safe-bottom)); z-index: 30;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 4px 0; color: var(--muted); font-size: 10px;
    }
    .tab-item.active { color: var(--accent); }
    .tab-item svg { width: 22px; height: 22px; }

    @media (min-width: 600px) {
      .app-shell { max-width: 600px; padding: 0 24px 64px; }
      .user-card { border-radius: var(--radius-md); margin: 8px 24px 0; border: 1px solid var(--border); }
      .page-header { border-radius: var(--radius-md) var(--radius-md) 0 0; margin-inline: 24px; }
      .service-section, .menu-list { margin-inline: 24px; }
      .service-section { padding-inline: 0; }
      .order-links { margin-top: 0; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="status-bar"><span>9:41</span><span>🔋 100%</span></div>

      <a class="service-item" href="#">
        <div class="service-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <div class="label">联系管家</div>
      </a>
    </div>
  </div>

  <!-- order status -->
  <div class="service-section">
    <h2>我的订单</h2>
    <div class="order-links">
      <a href="payment.html">待缴费</a>
      <a href="repair.html">处理中</a>

  </div>

  <!-- menu list -->

  <div class="menu-list">

    </a>
  </div>

  <!-- bottom tabs -->
  <div id="tab-bar" data-series="c" data-active="profile"></div>
</div>

<script>
// tab navigation
document.querySelectorAll('.tab-item').forEach(tab => {
  tab.addEventListener('click', e => {
    const href = tab.getAttribute('href');
    if (href && href !== '#' && !href.startsWith('http')) {
      e.preventDefault();
      window.location.href = href;
    }
  });
});
</script>
<script src="_region.js"></script>
<script src="_navmobile.js"></script>
</body>
</html>
