<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>评价晒图 · 贝壳找房旅居</title>
<link rel="stylesheet" href="lvju-app.css?v=5">
<style>
  .bigstar{text-align:center;padding:18px 16px 6px;}
  .bigstar .ss{color:var(--gold);font-size:34px;letter-spacing:6px;}
  .bigstar .tx{font-size:13px;color:var(--brand-deep);font-weight:700;margin-top:6px;}
  .rtags{display:flex;flex-wrap:wrap;gap:8px;padding:6px 16px 4px;}
  .rtags span{font-size:12px;padding:6px 13px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:#fff;}
  .rtags span.on{background:var(--brand-soft);color:var(--brand-deep);border-color:transparent;font-weight:600;}
</style>
</head>
<body>
<div class="app">
  <div class="scr">

    <div class="appbar">
      <a class="bk" href="lvju-app-orders.html" onclick="if(history.length>1){history.back();return false}">‹</a>
      <div class="ttl">评价晒图</div>
    </div>

    <div class="minihouse">
      <div class="th s-dong"></div>
      <div class="mi">
        <div class="nm">侗乡·鼓楼水岸</div>
        <div class="meta">5/01 — 5/03 · 2 晚 · 临水栋</div>
        <div class="st">订单号 …7715 · 已完成</div>
      </div>
    </div>

    <div class="bigstar">
      <div class="ss">★★★★★</div>
      <div class="tx">5.0 · 非常满意，强烈推荐</div>
    </div>

    <div class="seg">分项评分</div>
    <div class="panel">
      <div class="starset"><span class="k">环境景观</span><span class="stars">★★★★★</span><span class="v">5.0</span></div>
      <div class="starset"><span class="k">服务品质</span><span class="stars">★★★★★</span><span class="v">5.0</span></div>
      <div class="starset"><span class="k">设施配套</span><span class="stars">★★★★☆</span><span class="v">4.0</span></div>
      <div class="starset"><span class="k">交通区位</span><span class="stars">★★★★☆</span><span class="v">4.0</span></div>
      <div class="starset"><span class="k">特色体验</span><span class="stars">★★★★★</span><span class="v">5.0</span></div>
    </div>

    <div class="seg">晒图（已选 3 张）</div>
    <div class="upgrid">
      <div class="ph s-dong"></div>
      <div class="ph s-xiaoqikong"></div>
      <div class="ph s-food2"></div>
      <div class="add">＋</div>
    </div>

    <div class="seg">评价内容</div>
    <div class="tarea">侗寨临水的位置太美了，晚上鼓楼灯光和篝火长桌特别有氛围；管家提前帮我们订好长桌宴，全程很贴心。房间干净、被褥厚实，下次还来！</div>

    <div class="seg">贴标签</div>
    <div class="rtags">
      <span class="on">环境优美</span><span class="on">服务周到</span><span>物超所值</span>
      <span class="on">管家贴心</span><span>会再来</span><span>适合亲子</span>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 18px;font-size:13px;color:var(--muted);">
      <span>匿名评价</span><span style="font-size:11px;">关闭 ●○</span>
    </div>
  </div>

  <div class="cta">
    <a class="btn" href="lvju-app-orders.html" style="flex:1;text-align:center;">发布评价</a>
  </div>
</div>
</body>
</html>
