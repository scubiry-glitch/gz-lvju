<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>新居住 · 方案B 编辑部索引 · 贝壳</title>
<link rel="stylesheet" href="lvju-app.css?v=5">
<style>
  .scheme-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 0;font-size:10px;color:var(--muted);}
  .scheme-bar a{color:var(--brand);font-weight:600;}
  .masthead{padding:14px 18px 10px;border-bottom:1px solid var(--border);background:#fff;margin-top:-4px;}
  .masthead .row{display:flex;align-items:baseline;justify-content:space-between;}
  .masthead .ek{font-size:9px;letter-spacing:.38em;color:var(--gold-deep);}
  .masthead h2{font-family:var(--serif);font-size:22px;color:var(--ink);margin-top:4px;}
  .masthead .vol{font-size:10px;color:var(--muted);}
  .masthead .sum{display:flex;gap:20px;margin-top:12px;font-size:10px;color:var(--muted);}
  .masthead .sum b{font-family:var(--serif);font-size:16px;color:var(--brand-deep);display:block;}
  /* pill tabs */
  .pill-tabs{display:flex;gap:8px;padding:12px 18px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
  .pill-tabs a{flex:1;text-align:center;font-size:13px;font-weight:600;padding:9px 0;border-radius:999px;
    color:var(--muted);background:#f1f4f3;border:1px solid transparent;}
  .pill-tabs a.on{background:linear-gradient(90deg,var(--brand),var(--brand-2));color:#fff;box-shadow:0 6px 16px rgba(15,118,110,.2);}
  .pane{display:none;}
  .pane.on{display:block;}
  /* index rows */
  .index{padding:6px 18px 20px;}
  .ihead{display:grid;grid-template-columns:36px 1fr 52px 52px 52px;gap:6px;padding:8px 0 6px;
    font-size:9px;color:var(--muted);letter-spacing:.04em;border-bottom:2px solid var(--ink);}
  .ihead span:last-child{text-align:right;}
  .irow{display:grid;grid-template-columns:36px 1fr 52px 52px 52px;gap:6px;align-items:center;
    padding:14px 0;border-bottom:1px solid var(--border);color:var(--ink);}
  .irow .no{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--brand-deep);}
  .irow .nm{font-family:var(--serif);font-size:15px;font-weight:700;}
  .irow .nm small{display:block;font-family:var(--font);font-size:10px;font-weight:400;color:var(--muted);margin-top:2px;}
  .irow .n{text-align:center;font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ink);}
  .irow .n.gold{color:var(--gold-deep);}
  .irow .n small{display:block;font-family:var(--font);font-size:8px;font-weight:400;color:var(--muted);}
  .irow:active{background:var(--brand-soft);margin:0 -18px;padding-left:18px;padding-right:18px;}
  /* trade compact */
  .trade-wrap{padding:12px 18px 24px;}
</style>
</head>
<body>
<div class="app">
  <div class="scr">
    <div class="appbar">
      <a class="bk" href="beike-app-home.html">‹</a>
      <div class="ttl">新居住<small>方案 B · 编辑部索引</small></div>
      <div class="act"><a href="juzhu-channel-schemes.html">≡</a></div>
    </div>

    <div class="masthead">
      <div class="row">
        <div>
          <div class="ek">NANJING · NEW LIVING</div>
          <h2>保租房区划目录</h2>
        </div>
        <div class="vol">Vol. 2026<br>试点期</div>
      </div>
      <div class="sum">
        <div><b>11</b>行政区</div>
        <div><b>93</b>在营项目</div>
        <div><b>2.1万</b>在租套数</div>
        <div><b>¥1,420</b>全市均价</div>
      </div>
    </div>

    <div class="scheme-bar"><span>方案 B · 编辑部索引</span><a href="juzhu-channel-schemes.html">切换方案 ›</a></div>

    <div class="pill-tabs" id="tabs">
      <a class="on" data-tab="bzf">保租房</a>
      <a data-tab="trade">卖旧买新</a>
    </div>

    <div class="pane on" id="pane-bzf">
      <div class="index">
        <div class="ihead">
          <span>NO.</span><span>行政区</span><span style="text-align:center">项目</span>
          <span style="text-align:center">可租</span><span style="text-align:center">均价</span>
        </div>
        <div id="index-list"></div>
      </div>
      <div class="banner gold" style="margin-top:0;">
        <span class="bi">📋</span>
        <div class="bt"><b>目录说明</b><p>数字为试点在营数据 · 点击行进入区级房源列表</p></div>
      </div>
    </div>

    <div class="pane" id="pane-trade">
      <div class="sec-h" style="margin-top:14px;"><span class="bar"></span><h2>置换房源</h2><span class="more">筛选 ›</span></div>
      <div class="trade-wrap" id="trade-list"></div>
    </div>
  </div>

  <div class="tabbar">
    <a href="beike-app-home.html"><span class="ti">🏠</span>首页</a>
    <a class="on"><span class="ti">🏡</span>新居住</a>
    <a href="lvju-app-messages.html"><span class="ti">💬</span>消息</a>
    <a href="lvju-app-me.html"><span class="ti">👤</span>我的</a>
  </div>
</div>
<script>
const DIST=[
  {name:'建邺区',no:'01',projects:12,vacant:156,avg:1680,sub:'河西 · 奥体 · 江心洲'},
  {name:'江宁区',no:'02',projects:18,vacant:289,avg:1420,sub:'百家湖 · 九龙湖 · 禄口'},
  {name:'鼓楼区',no:'03',projects:8,vacant:92,avg:1920,sub:'湖南路 · 中央门'},
  {name:'玄武区',no:'04',projects:6,vacant:68,avg:1850,sub:'新街口 · 徐庄'},
  {name:'秦淮区',no:'05',projects:7,vacant:74,avg:1780,sub:'夫子庙 · 南部新城'},
  {name:'雨花台区',no:'06',projects:9,vacant:118,avg:1520,sub:'软件谷 · 铁心桥'},
  {name:'栖霞区',no:'07',projects:11,vacant:142,avg:1380,sub:'仙林 · 迈皋桥'},
  {name:'浦口区',no:'08',projects:10,vacant:131,avg:1280,sub:'江北新区 · 桥北'},
  {name:'六合区',no:'09',projects:5,vacant:56,avg:980,sub:'龙池 · 雄州'},
  {name:'溧水区',no:'10',projects:4,vacant:38,avg:880,sub:'永阳 · 空港'},
  {name:'高淳区',no:'11',projects:3,vacant:24,avg:820,sub:'淳溪 · 慢城'},
];
const TRADE=[
  {nm:'河西南置换三房',meta:'建邺区 · 89㎡ · 南北',tags:['以旧换新','补贴'],pr:480,img:'g4',old:'旧房320万'},
  {nm:'百家湖地铁两居',meta:'江宁区 · 76㎡ · 南',tags:['满五','近地铁'],pr:268,img:'g5',old:'旧房180万'},
  {nm:'湖南路精装三房',meta:'鼓楼区 · 92㎡ · 南',tags:['置换补贴'],pr:295,img:'g6',old:'旧房220万'},
  {nm:'仙林改善四房',meta:'栖霞区 · 118㎡ · 南北',tags:['以旧换新'],pr:358,img:'g7',old:'旧房260万'},
  {nm:'江北新区次新房',meta:'浦口区 · 105㎡ · 南',tags:['低总价'],pr:198,img:'g8',old:'旧房150万'},
];
document.getElementById('index-list').innerHTML=DIST.map(d=>`
  <a class="irow" href="juzhu-bzf-list.html?district=${encodeURIComponent(d.name)}" style="display:grid;text-decoration:none;">
    <span class="no">${d.no}</span>
    <span class="nm">${d.name}<small>${d.sub}</small></span>
    <span class="n">${d.projects}<small>项</small></span>
    <span class="n">${d.vacant}<small>套</small></span>
    <span class="n gold">${d.avg}<small>元/月</small></span>
  </a>`).join('');
document.getElementById('trade-list').innerHTML=TRADE.map(x=>`
  <a class="lrow" href="lvju-app-resale-detail.html">
    <div class="th ${x.img}"><span class="star">置换</span></div>
    <div class="info">
      <div class="nm">${x.nm}</div>
      <div class="meta">${x.meta}</div>
      <div class="tags">${x.tags.map(t=>'<span>'+t+'</span>').join('')}</div>
      <div class="pr"><b>${x.pr}<small>万起</small></b><span class="unit">${x.old}</span></div>
    </div>
  </a>`).join('');
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('[data-tab]');if(!t)return;
  document.querySelectorAll('.pill-tabs a').forEach(a=>a.classList.toggle('on',a===t));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id==='pane-'+t.dataset.tab));
});
</script>
</body>
</html>
